name: limitflow_mobile
description: >
  LimitFlow — the customer-facing mobile app demonstrating a modern,
  self-service transfer-limit increase journey.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^2.6.1
  go_router: ^17.3.0

  # Networking
  dio: ^5.10.0

  # Storage
  flutter_secure_storage: ^10.3.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Mock biometric authentication
  local_auth: ^3.0.2

  # Formatting
  intl: ^0.20.3

  cupertino_icons: ^1.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true