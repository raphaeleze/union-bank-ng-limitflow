name: limitflow_mobile
description: >
  LimitFlow — the customer-facing mobile app demonstrating a modern,
  self-service transfer-limit increase journey.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0

  # Networking
  dio: ^5.5.0

  # Storage
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Mock biometric authentication
  local_auth: ^2.3.0

  # Formatting
  intl: ^0.19.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true