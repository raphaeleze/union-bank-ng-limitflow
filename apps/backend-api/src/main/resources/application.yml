spring:
  application:
    name: limitflow-backend-api
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/limitflow}
    username: ${DB_USERNAME:limitflow}
    password: ${DB_PASSWORD:limitflow}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: ${SERVER_PORT:8080}

limitflow:
  security:
    jwt:
      secret: ${JWT_SECRET:this-is-a-demo-secret-key-for-limitflow-do-not-use-in-production}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
  twilio:
    enabled: ${TWILIO_ENABLED:false}
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    from-number: ${TWILIO_FROM_NUMBER:}
  risk:
    high-threshold: ${RISK_HIGH_THRESHOLD:1000000}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

logging:
  level:
    com.limitflow.backend: INFO
