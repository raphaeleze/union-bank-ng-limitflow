services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: limitflow
      POSTGRES_USER: limitflow
      POSTGRES_PASSWORD: limitflow
    ports:
      - "5432:5432"
    volumes:
      - limitflow-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U limitflow -d limitflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-api:
    build:
      context: ../apps/backend-api
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/limitflow
      DB_USERNAME: limitflow
      DB_PASSWORD: limitflow
      JWT_SECRET: local-development-secret-change-me-before-any-real-deployment
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # Actuator's default health check includes a DataSource ping, so this
      # only reports healthy once the app is actually ready to serve traffic,
      # not just "the JVM started".
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s

  employee-portal:
    build:
      context: ../apps/employee-portal
      args:
        # Baked into the client bundle at build time (see Dockerfile) — must be
        # an address reachable from the browser, not the "backend-api" service
        # name, which only resolves inside the compose network.
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      backend-api:
        condition: service_healthy

  customer-portal:
    build:
      context: ../apps/customer-portal
      args:
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8080/api
    ports:
      - "3001:3000"
    depends_on:
      backend-api:
        condition: service_healthy

volumes:
  limitflow-postgres-data:
